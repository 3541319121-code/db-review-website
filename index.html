<!-- 首页 -->


<section class="hero"
id="home">


<div class="container">


<div class="row align-items-center">


<div class="col-lg-7">


<h1>

全国计算机等级考试

<br>

三级数据库技术

</h1>



<h3>

系统复习 · 高频考点 · 真题训练 · 冲刺提分

</h3>



<div class="hero-card mt-4">


<p>

<i class="fa-solid fa-graduation-cap"></i>

考试等级：

NCRE三级数据库技术

</p>


<p>

<i class="fa-solid fa-book"></i>

核心：

数据库原理、SQL、设计、事务

</p>


</div>



</div>





<div class="col-lg-5">


<div class="progress-box" id="dashboardBox">


<h4>

学习统计

</h4>



<div id="dashboardContent">
<p class="text-muted">登录后查看学习数据</p>
</div>


</div>


</div>



</div>


</div>


</section>







<!-- 大纲 -->


<section id="outline">


<div class="container">


<div class="row align-items-center mb-4">
  <div class="col-md-8"><h2 class="text-center m-0">考试大纲</h2></div>
  <div class="col-md-4">
    <div class="input-group">
      <input type="text" id="searchInput" class="form-control" placeholder="搜索知识点...">
      <button class="btn btn-primary" onclick="searchKnowledge()"><i class="fa-solid fa-search"></i></button>
    </div>
  </div>
</div>


<div id="outlineBox"
class="accordion mt-5">

</div>


</div>


</section>







<!-- 思维导图 -->


<section>


<div class="container">


<h2 class="text-center">

知识点思维导图

</h2>



<div id="mindmap"
class="mindmap">


<div class="node center-node">

三级数据库技术

</div>


</div>



<div id="mindInfo"
class="alert alert-info mt-4">

点击节点查看知识

</div>


</div>


</section>








<!-- SQL -->


<section id="sql">


<div class="container">


<h2 class="text-center">

SQL专项训练

</h2>



<div class="card p-4 mt-5">


<h4 id="sqlTitle"></h4>


<p id="sqlQuestion"></p>



<textarea
id="sqlInput"
class="form-control"
rows="4">

</textarea>



<button
class="btn btn-primary mt-3"
onclick="showSQLAnswer()">

查看答案

</button>



<button
class="btn btn-success mt-3"
onclick="nextSQL()">

下一题

</button>



<div id="sqlAnswer"
class="alert alert-success mt-3"
style="display:none">

</div>



<button
class="btn btn-danger"
onclick="addWrong()">

加入错题本

</button>


<p class="mt-3">

题号：

<span id="sqlIndex"></span>

</p>



</div>



</div>


</section>






<!-- 图表 -->


<section>


<div class="container">


<h2 class="text-center">

历年真题分析

</h2>



<div class="row">


<div class="col-md-4">

<div id="chart1"
class="chart">

</div>

</div>



<div class="col-md-4">

<div id="chart2"
class="chart">

</div>

</div>



<div class="col-md-4">

<div id="chart3"
class="chart">

</div>

</div>


</div>


</div>


</section>






<!-- 模拟考试 -->


<section id="exam">


<div class="container">


<h2 class="text-center">

模拟考试系统

</h2>



<div class="card p-4 mt-5">


<h5>

剩余时间：

<span id="timer">

60:00

</span>


</h5>



<button
class="btn btn-primary"
onclick="startExam()">

开始考试

</button>



<div id="examArea"
class="mt-4">

</div>



<button
class="btn btn-success mt-4"
onclick="submitExam()">

提交

</button>



<div id="examResult"
class="alert alert-info mt-3"
style="display:none">

</div>


</div>


</div>


</section>






<!-- 错题 -->

<section>


<div class="container">


<h2 class="text-center">

错题本

</h2>


<h3>

错题数量：

<span id="wrongCount">

0

</span>

</h3>


<ul id="wrongList"
class="list-group">

</ul>


</div>


</section>






<footer>

全国计算机等级考试三级数据库技术复习平台

</footer>

<!-- 加载动画 -->
<div id="loader">
<div class="loader-circle"></div>
</div>

<!-- 登录/注册 Modal -->
<div class="modal fade" id="authModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="authModalLabel">欢迎</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <div class="mb-3">
          <label class="form-label">用户名</label>
          <input type="text" id="username" class="form-control" placeholder="请输入用户名">
        </div>
        <div class="mb-3">
          <label class="form-label">密码</label>
          <input type="password" id="password" class="form-control" placeholder="请输入密码">
        </div>
        <div id="authTip" class="text-danger small" style="display:none"></div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
        <button type="button" class="btn btn-outline-primary" onclick="register()">注册</button>
        <button type="button" class="btn btn-primary" onclick="login()">登录</button>
      </div>
    </div>
  </div>
</div>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/app.js"></script>
