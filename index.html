<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8" />
<meta name="viewport"
content="width=device-width,initial-scale=1.0">


<title>
全国计算机等级考试三级数据库技术复习平台
</title>


<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">


<link
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
rel="stylesheet">


<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js">
</script>


<link rel="stylesheet" href="style.css">


</head>



<body>

<h2>
NCRE三级数据库学习系统
</h2>


<input id="username"
placeholder="用户名">


<input id="password"
type="password"
placeholder="密码">


<button onclick="login()">
登录
</button>


<button onclick="register()">
注册
</button>


<script src="js/app.js"></script>

<!-- 加载动画 -->

<div id="loader">

<div class="loader-circle"></div>

</div>





<!-- 导航 -->

<nav class="navbar navbar-expand-lg fixed-top">


<div class="container">


<a class="navbar-brand fw-bold text-primary">

<i class="fa-solid fa-database"></i>

NCRE数据库技术

</a>



<button class="navbar-toggler"
data-bs-toggle="collapse"
data-bs-target="#menu">

☰

</button>




<div class="collapse navbar-collapse"
id="menu">


<ul class="navbar-nav ms-auto">


<li class="nav-item">
<a class="nav-link"
href="#home">

首页

</a>
</li>


<li class="nav-item">
<a class="nav-link"
href="#outline">

考试大纲

</a>
</li>



<li class="nav-item">
<a class="nav-link"
href="#sql">

SQL训练

</a>
</li>



<li class="nav-item">
<a class="nav-link"
href="#exam">

模拟考试

</a>
</li>



<li class="nav-item">

<button class="btn btn-primary"
onclick="toggleDark()">

<i class="fa-solid fa-moon"></i>

</button>


</li>



</ul>


</div>


</div>

</nav>






<!-- 首页 -->


<section class="hero"
id="home">


<div class="container">


<div class="row align-items-center">


<div class="col-lg-7">


<h1>

全国计算机等级考试

<br>

三级数据库技术

</h1>



<h3>

系统复习 · 高频考点 · 真题训练 · 冲刺提分

</h3>



<div class="hero-card mt-4">


<p>

<i class="fa-solid fa-graduation-cap"></i>

考试等级：

NCRE三级数据库技术

</p>


<p>

<i class="fa-solid fa-book"></i>

核心：

数据库原理、SQL、设计、事务

</p>


</div>



</div>





<div class="col-lg-5">


<div class="progress-box">


<h4>

学习路线

</h4>



数据库基础

<div class="progress">

<div class="progress-bar"
style="width:90%">

90%

</div>

</div>



SQL训练

<div class="progress">

<div class="progress-bar bg-success"
style="width:70%">

70%

</div>

</div>



真题训练

<div class="progress">

<div class="progress-bar bg-warning"
style="width:55%">

55%

</div>

</div>


</div>


</div>



</div>


</div>


</section>







<!-- 大纲 -->


<section id="outline">


<div class="container">


<h2 class="text-center">

考试大纲

</h2>


<div id="outlineBox"
class="accordion mt-5">

</div>


</div>


</section>







<!-- 思维导图 -->


<section>


<div class="container">


<h2 class="text-center">

知识点思维导图

</h2>



<div id="mindmap"
class="mindmap">


<div class="node center-node">

三级数据库技术

</div>


</div>



<div id="mindInfo"
class="alert alert-info mt-4">

点击节点查看知识

</div>


</div>


</section>








<!-- SQL -->


<section id="sql">


<div class="container">


<h2 class="text-center">

SQL专项训练

</h2>



<div class="card p-4 mt-5">


<h4 id="sqlTitle"></h4>


<p id="sqlQuestion"></p>



<textarea
id="sqlInput"
class="form-control"
rows="4">

</textarea>



<button
class="btn btn-primary mt-3"
onclick="showSQLAnswer()">

查看答案

</button>



<button
class="btn btn-success mt-3"
onclick="nextSQL()">

下一题

</button>



<div id="sqlAnswer"
class="alert alert-success mt-3"
style="display:none">

</div>



<button
class="btn btn-danger"
onclick="addWrong()">

加入错题本

</button>


<p class="mt-3">

题号：

<span id="sqlIndex"></span>

</p>



</div>



</div>


</section>






<!-- 图表 -->


<section>


<div class="container">


<h2 class="text-center">

历年真题分析

</h2>



<div class="row">


<div class="col-md-4">

<div id="chart1"
class="chart">

</div>

</div>



<div class="col-md-4">

<div id="chart2"
class="chart">

</div>

</div>



<div class="col-md-4">

<div id="chart3"
class="chart">

</div>

</div>


</div>


</div>


</section>






<!-- 模拟考试 -->


<section id="exam">


<div class="container">


<h2 class="text-center">

模拟考试系统

</h2>



<div class="card p-4 mt-5">


<h5>

剩余时间：

<span id="timer">

60:00

</span>


</h5>



<button
class="btn btn-primary"
onclick="startExam()">

开始考试

</button>



<div id="examArea"
class="mt-4">

</div>



<button
class="btn btn-success mt-4"
onclick="submitExam()">

提交

</button>



<div id="examResult"
class="alert alert-info mt-3"
style="display:none">

</div>


</div>


</div>


</section>






<!-- 错题 -->

<section>


<div class="container">


<h2 class="text-center">

错题本

</h2>


<h3>

错题数量：

<span id="wrongCount">

0

</span>

</h3>


<ul id="wrongList"
class="list-group">

</ul>


</div>


</section>






<footer>

全国计算机等级考试三级数据库技术复习平台

</footer>





<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
</script>


<script src="app.js"></script>


</body>

</html>
