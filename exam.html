<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>在线刷题 - NCRE数据库技术</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar navbar-expand-lg fixed-top">
  <div class="container">
    <a class="navbar-brand fw-bold text-primary" href="index.html">
      <i class="fa-solid fa-database"></i> NCRE数据库技术
    </a>
    <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">☰</button>
    <div class="collapse navbar-collapse" id="menu">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="index.html">首页</a></li>
        <li class="nav-item"><a class="nav-link" href="index.html#outline">考试大纲</a></li>
        <li class="nav-item"><a class="nav-link" href="index.html#sql">SQL训练</a></li>
        <li class="nav-item"><a class="nav-link" href="index.html#exam">模拟考试</a></li>
        <li class="nav-item"><a class="nav-link active" href="exam.html">在线刷题</a></li>
        <li class="nav-item" id="userArea"><button class="btn btn-outline-primary" data-bs-toggle="modal" data-bs-target="#authModal">登录 / 注册</button></li>
        <li class="nav-item"><button class="btn btn-primary" onclick="toggleDark()"><i class="fa-solid fa-moon"></i></button></li>
      </ul>
    </div>
  </div>
</nav>

<div class="container" style="padding-top:100px; padding-bottom:60px;">
  <h1 class="mb-4"><i class="fa-solid fa-pen-to-square"></i> 在线刷题</h1>

  <div id="box" class="card p-4 mb-3"></div>

  <div class="d-flex gap-2">
    <button class="btn btn-primary" onclick="next()">下一题</button>
    <a href="index.html" class="btn btn-outline-secondary">返回首页</a>
  </div>
</div>

<!-- 登录/注册 Modal -->
<div class="modal fade" id="authModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">欢迎</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <div class="mb-3">
          <label class="form-label">用户名</label>
          <input type="text" id="username" class="form-control" placeholder="请输入用户名">
        </div>
        <div class="mb-3">
          <label class="form-label">密码</label>
          <input type="password" id="password" class="form-control" placeholder="请输入密码">
        </div>
        <div id="authTip" class="text-danger small" style="display:none"></div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
        <button type="button" class="btn btn-outline-primary" onclick="register()">注册</button>
        <button type="button" class="btn btn-primary" onclick="login()">登录</button>
      </div>
    </div>
  </div>
</div>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/exam.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
function toggleDark(){
  document.body.classList.toggle("dark");
  localStorage.setItem("dark", document.body.classList.contains("dark"));
}
if(localStorage.getItem("dark")=="true"){
  document.body.classList.add("dark");
}

function renderUser() {
  var userArea = document.getElementById("userArea");
  if (!userArea) return;
  if (Auth.isLoggedIn()) {
    var username = Auth.getUserId();
    userArea.innerHTML = '<span class="navbar-text me-2">用户 ' + username + '</span>' +
      '<button class="btn btn-outline-danger btn-sm" onclick="logout()">退出</button>';
  } else {
    userArea.innerHTML = '<button class="btn btn-outline-primary" data-bs-toggle="modal" data-bs-target="#authModal">登录 / 注册</button>';
  }
}

function logout() {
  Auth.clearSession();
  renderUser();
  alert("已退出登录");
}

function showAuthTip(msg) {
  var tip = document.getElementById("authTip");
  if (tip) { tip.textContent = msg; tip.style.display = "block"; }
}
function hideAuthTip() {
  var tip = document.getElementById("authTip");
  if (tip) { tip.style.display = "none"; }
}
function closeAuthModal() {
  var modalEl = document.getElementById("authModal");
  if (modalEl) { var modal = bootstrap.Modal.getInstance(modalEl); if (modal) modal.hide(); }
}

function register() {
  hideAuthTip();
  api.register(username.value, password.value)
    .then(function (data) {
      if (data.msg && data.msg.indexOf("成功") !== -1) {
        showAuthTip(data.msg + "，请登录");
      } else {
        showAuthTip(data.msg || "注册失败");
      }
    })
    .catch(function (err) { showAuthTip(err.message || "注册失败"); });
}

function login() {
  hideAuthTip();
  api.login(username.value, password.value)
    .then(function (data) {
      if (data.token) {
        Auth.setSession(data.token, data.id);
        closeAuthModal();
        renderUser();
        username.value = "";
        password.value = "";
      } else {
        showAuthTip(data.msg || "登录失败");
      }
    })
    .catch(function (err) { showAuthTip(err.message || "登录失败"); });
}

renderUser();
</script>

</body>
</html>
