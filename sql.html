</head>
<body>

<!-- 顶部导航 -->
<nav class="top-nav">
  <button class="nav-toggle" onclick="document.querySelector('.nav-links').classList.toggle('show')">☰</button>
  <a href="index.html" class="nav-brand">
    <i class="fa-solid fa-database"></i> NCRE数据库技术
  </a>
  <div class="nav-links">
    <a href="index.html">首页</a>
    <a href="outline.html">考试大纲</a>

  <div class="nav-actions">
    <span id="userArea"></span>
    <a href="login.html"><button>登录 / 注册</button></a>
  </div>
</nav>

<div class="page-wrap">
  <aside class="sidebar">
    <div class="sidebar-nav">
      <div class="section-title">学习内容</div>
      <a href="index.html"><i class="fa-solid fa-house"></i> 首页</a>
      <a href="outline.html"><i class="fa-solid fa-book-open"></i> 考试大纲</a>
      <a href="sql.html" class="active"><i class="fa-solid fa-code"></i> SQL训练</a>
      <a href="exam.html"><i class="fa-solid fa-clock"></i> 模拟考试</a>
      <a href="practice.html"><i class="fa-solid fa-pen-to-square"></i> 在线刷题</a>
      <a href="wrong.html"><i class="fa-solid fa-circle-xmark"></i> 错题本</a>
    </div>
  </aside>

  <main class="main-content">
    <div class="page-header">
      <h1>SQL专项训练</h1>
      <p>手写SQL语句，查看标准答案，加入错题本</p>
    </div>

    <div class="card">
      <div class="flex items-center justify-between mb-2">
        <div class="tag" id="sqlTag">基础查询</div>
        <div class="text-muted">题号：<span id="sqlIndex">1/10</span></div>
      </div>

      <h3 class="card-title" id="sqlQuestion">查询student表所有数据</h3>

      <label class="form-label">你的答案</label>
      <textarea id="sqlInput" class="sql-textarea" rows="4" placeholder="在此输入SQL语句..."></textarea>

      <div class="flex gap-2 mt-2">
        <button class="btn btn-primary" onclick="showSQLAnswer()"><i class="fa-solid fa-eye"></i> 查看答案</button>
        <button class="btn btn-secondary" onclick="nextSQL()"><i class="fa-solid fa-arrow-right"></i> 下一题</button>
        <button class="btn btn-secondary" onclick="addWrong()"><i class="fa-solid fa-plus"></i> 加入错题本</button>
      </div>

      <div id="sqlAnswer" class="alert alert-success mt-2" style="display:none"></div>
    </div>

    <div class="page-footer">
      全国计算机等级考试三级数据库技术复习平台
    </div>
  </main>
</div>

<div id="loader"><div class="loader-circle"></div></div>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/sql.js"></script>

</body>
