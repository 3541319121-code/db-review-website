<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title></title>
	</head>
	<body>
		<h1>
		我的学习中心
		</h1>
		
		
		<h2>
		完成题目:
		<span id="total">
		0
		</span>
		</h2>
		
		
		<h2>
		正确率:
		<span id="rate">
		0%
		</span>
		</h2>
		
		
		<script>
		
		
		fetch(
		
		"http://localhost:3000/dashboard/"
		+
		localStorage.getItem("user_id")
		
		)
		
		.then(r=>r.json())
		
		.then(data=>{
		
		
		total.innerHTML=
		data.total;
		
		
		rate.innerHTML=
		data.rate+"%";
		
		
		});
		
		
		</script>
	</body>
</html>
